{% extends "base.html" %}
{% block title %}Sign In – FinTrack{% endblock %}

{% block head %}
<style>
/* ── Auth page layout (shared with signup) ─────────── */
.auth-page {
    min-height: calc(100vh - var(--navbar-height));
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    background:
        radial-gradient(ellipse 70% 50% at 50% -5%, var(--accent-light) 0%, transparent 65%),
        var(--bg-page);
}

.auth-card {
    width: 100%;
    max-width: 440px;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px 40px 36px;
    box-shadow: var(--shadow-lg);
    animation: fade-up 0.4s ease both;
}

.auth-card__logo {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 28px;
    text-decoration: none;
}
.auth-card__logo-text {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.02em;
}
.auth-card__logo-text span { color: var(--accent); }

.auth-card__heading {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.025em;
    margin-bottom: 6px;
}
.auth-card__sub {
    font-size: 0.9rem;
    color: var(--text-muted);
    margin-bottom: 28px;
}

/* Remember-me row */
.auth-options {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    font-size: 0.875rem;
}
.auth-options label {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text-secondary);
    cursor: pointer;
    user-select: none;
}
.auth-options input[type="checkbox"] {
    width: 16px;
    height: 16px;
    accent-color: var(--accent);
    cursor: pointer;
}
.auth-options a {
    color: var(--accent);
    font-weight: 500;
}

/* Input with icon */
.input-group {
    position: relative;
}
.input-group .form-control {
    padding-right: 42px;
}
.input-group__toggle {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    padding: 0;
    display: flex;
    align-items: center;
    transition: color 0.2s ease;
}
.input-group__toggle:hover { color: var(--text-primary); }

.auth-switch {
    text-align: center;
    font-size: 0.875rem;
    color: var(--text-muted);
    margin-top: 24px;
}
.auth-switch a {
    color: var(--accent);
    font-weight: 600;
}

@media (max-width: 440px) {
    .auth-card { padding: 28px 20px 24px; }
}
</style>
{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">

        <!-- Brand -->
        <a href="{{ url_for('main.index') }}" class="auth-card__logo">
            <svg width="26" height="26" viewBox="0 0 28 28" fill="none"><rect width="28" height="28" rx="8" fill="var(--accent)"/><path d="M7 18L11 13L15 16L21 9" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <span class="auth-card__logo-text">Fin<span>Track</span></span>
        </a>

        <h1 class="auth-card__heading">Welcome back</h1>
        <p class="auth-card__sub">Sign in to your FinTrack account.</p>

        <!-- Login Form -->
        <form method="POST" action="{{ url_for('auth.login') }}" novalidate id="login-form">

            <div class="form-group">
                <label class="form-label" for="email">Email address</label>
                <input
                    class="form-control"
                    type="email"
                    id="email"
                    name="email"
                    placeholder="jane@example.com"
                    value="{{ email or '' }}"
                    autocomplete="email"
                    required
                    autofocus
                />
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <div class="input-group">
                    <input
                        class="form-control"
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Your password"
                        autocomplete="current-password"
                        required
                    />
                    <button type="button" class="input-group__toggle" id="toggle-pw" aria-label="Show password">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </div>
            </div>

            <!-- Remember me + Forgot password -->
            <div class="auth-options">
                <label>
                    <input type="checkbox" name="remember" id="remember" />
                    Remember me
                </label>
                <a href="#">Forgot password?</a>
            </div>

            <button type="submit" class="btn btn--primary btn--full">
                Sign in
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
            </button>

        </form>

        <div class="auth-switch">
            New to FinTrack? <a href="{{ url_for('auth.signup') }}">Create an account</a>
        </div>

    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
(function () {
    var btn   = document.getElementById('toggle-pw');
    var input = document.getElementById('password');
    if (btn && input) {
        btn.addEventListener('click', function () {
            var isText = input.type === 'text';
            input.type = isText ? 'password' : 'text';
            btn.querySelector('svg').style.opacity = isText ? '1' : '0.5';
        });
    }
})();
</script>
{% endblock %}
